<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>軟創一行事曆</title>
<style>
    body {
        font-family: "Microsoft JhengHei", sans-serif;
        background: #f4f6fb;
        margin: 0;
        padding: 30px;
    }

    /* 標題 */
    h1 {
        text-align: center;
    }

    /* 雲端狀態提示 */
    #cloudStatus {
        text-align: center;
        font-size: 14px;
        margin-top: -10px;
        margin-bottom: 20px;
        color: #888;
    }
    .status-local { color: #d97706 !important; }
    .status-cloud { color: #16a34a !important; }
    .status-error { color: #dc2626 !important; } /* 新增錯誤狀態顏色 */

    /* 搜尋區 */
    .search-box {
        background: #dcdcdc;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        text-align: center;
    }

    input {
        padding: 10px;
        width: 250px;
        border-radius: 6px;
        border: 1px solid #aaa;
    }

    /* 新增區 */
    .form-area {
        text-align: center;
        margin-bottom: 20px;
    }

    .form-area input {
        margin: 5px;
    }

    /* 按鈕 */
    button {
        padding: 10px 15px;
        border: none;
        border-radius: 6px;
        background: #6c83d6;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #556bd1;
    }

    /* 表格 */
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
    }

    th {
        background: #7f95d6;
        color: white;
        padding: 12px;
    }

    td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }

    tr:hover {
        background: #f1f3ff;
    }

    /* 倒數區 */
    .countdown-box {
        text-align: center;
        margin: 20px auto;
        padding: 15px;
        background: white;
        border-radius: 12px;
        width: 300px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* 沙漏 (真實比例耗盡版) */
    .hourglass {
        position: relative;
        width: 50px;
        height: 80px;
        margin: 20px auto;
        background: #e2e8f7;
        clip-path: polygon(0% 0%, 100% 0%, 55% 50%, 100% 100%, 0% 100%, 45% 50%);
        overflow: hidden;
    }

    .hourglass.active::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translateX(-50%);
        width: 3px;
        height: 50%;
        background: repeating-linear-gradient(to bottom, #e6c15a 0px, #e6c15a 4px, transparent 4px, transparent 8px);
        background-size: 100% 8px;
        animation: fallingSand 0.2s infinite linear;
        z-index: 10;
    }

    .hourglass.finished {
        animation: flipFinished 2s infinite ease-in-out;
    }

    .sand {
        position: absolute;
        width: 100%;
        background: #e6c15a;
        transition: height 1s linear;
    }

    .top {
        top: auto;
        bottom: 50%;
        height: 50%;
    }

    .bottom {
        bottom: 0;
        height: 0%;
    }

    @keyframes fallingSand {
        0% { background-position: 0 0px; }
        100% { background-position: 0 8px; } 
    }

    @keyframes flipFinished {
        0% { transform: rotate(0deg); }
        50% { transform: rotate(180deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</head>

<body>

    <div class="countdown-box">
        <h2 id="examTitle">最近考試：--</h2>
        <div class="hourglass">
            <div class="sand top"></div>
            <div class="sand bottom"></div>
        </div>
        <h3 id="countdown">00天 00:00:00</h3>
    </div>

    <h1>📅 軟創一行事曆</h1>
    
    <!-- 顯示目前的連線模式 -->
    <div id="cloudStatus">偵測環境中...</div>

    <div class="search-box">
        🔎 搜尋：
        <input type="text" id="searchInput" placeholder="搜尋關鍵字 (日期/課程名稱)">
    </div>

    <div class="form-area">
        <input type="datetime-local" id="date">
        <input type="text" id="course" placeholder="課程名稱">
        <input type="text" id="event" placeholder="事項">
        <input type="text" id="note" placeholder="備註">
        <button onclick="addEvent()">新增</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>日期與時間</th>
                <th>課程名稱</th>
                <th>事項</th>
                <th>備註</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="calendarBody">
        </tbody>
    </table>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 🌟 【自訂雲端金鑰區】 🌟
    const myFirebaseConfig = {
        apiKey: "AIzaSyAAGpDcSPznoavs6_xm5FWDNCpMeJ3VXX4",
        authDomain: "calendar-99632.firebaseapp.com",
        projectId: "calendar-99632",
        storageBucket: "calendar-99632.firebasestorage.app",
        messagingSenderId: "864031400093",
        appId: "1:864031400093:web:44ddcd4f857f9b75457474",
        measurementId: "G-ZKH8YYR77Z"
    }; 

    const envFirebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
    const activeFirebaseConfig = myFirebaseConfig || envFirebaseConfig;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-github-calendar';
    const isUsingCustomConfig = myFirebaseConfig !== null;

    let data = [];
    let countdownTimer;
    let isCloudMode = false;
    let db, auth;
    let currentUser = null;

    // ⭐ 系統初始化邏輯 (加入全面性的 Try-Catch 防護罩)
    try {
        if (activeFirebaseConfig) { 
            isCloudMode = true;
            document.getElementById("cloudStatus").innerHTML = "🟢 目前為：雲端共用模式 (連線中...)";
            document.getElementById("cloudStatus").className = "status-cloud";

            // 在無痕模式下，這兩行可能因為無法存取隱私權限而報錯當機，所以用 try 包起來
            const app = initializeApp(activeFirebaseConfig); 
            auth = getAuth(app);
            db = getFirestore(app);

            const initAuth = async () => {
                try {
                    if (!isUsingCustomConfig && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("登入失敗，切換回單機模式:", error);
                    fallbackToLocal();
                }
            };
            initAuth();

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    document.getElementById("cloudStatus").innerHTML = "🟢 目前為：雲端共用模式";
                    setupRealtimeUpdates();
                }
            });

        } else {
            fallbackToLocal();
        }
    } catch (criticalError) {
        // 攔截所有嚴重的環境錯誤 (如 Line 內建瀏覽器阻擋 IndexedDB 等)
        console.error("Firebase 初始化遭遇環境限制:", criticalError);
        fallbackToLocal(); 
    }

    // 降級為單機模式 (同樣加上防護，防止 LocalStorage 被阻擋而當機)
    function fallbackToLocal() {
        isCloudMode = false;
        const statusEl = document.getElementById("cloudStatus");
        
        try {
            const saved = localStorage.getItem("calendarData");
            data = saved ? JSON.parse(saved) : [];
            statusEl.innerHTML = "🟠 目前為：單機儲存模式 (僅儲存於本機)";
            statusEl.className = "status-local";
        } catch (storageError) {
            // 在極度嚴格的無痕模式中，連 LocalStorage 都不能讀
            console.error("本機儲存空間被阻擋:", storageError);
            data = [];
            statusEl.innerHTML = "🔴 瀏覽器隱私限制過高 (無法永久儲存資料)";
            statusEl.className = "status-error";
        }
        refreshUI();
    }

    // 監聽雲端資料庫的即時更新
    function setupRealtimeUpdates() {
        if (!currentUser) return;
        const eventsRef = collection(db, 'artifacts', appId, 'public', 'data', 'events');
        
        onSnapshot(eventsRef, (snapshot) => {
            const newData = [];
            snapshot.forEach((doc) => {
                newData.push({ ...doc.data() });
            });
            data = newData;
            refreshUI();
        }, (error) => {
            console.error("雲端同步錯誤:", error);
            fallbackToLocal();
        });
    }

    // 畫面更新統整包
    function refreshUI() {
        const keyword = document.getElementById("searchInput").value.toLowerCase();
        if (keyword) {
            const filtered = data.filter(item =>
                item.date.includes(keyword) ||
                item.course.toLowerCase().includes(keyword)
            );
            renderTable(filtered);
        } else {
            renderTable(data);
        }
        startCountdown();
    }

    // 渲染表格
    function renderTable(list) {
        const tbody = document.getElementById("calendarBody");
        tbody.innerHTML = "";

        list.forEach((item) => {
            const displayDate = item.date.replace('T', ' ');
            const row = `
            <tr>
                <td>${displayDate}</td>
                <td>${item.course}</td>
                <td>${item.event}</td>
                <td>${item.note}</td>
                <td>
                    <button onclick="window.deleteEvent('${item.id}')">
                        ❌ 刪除
                    </button>
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // 新增事件 (加上寫入防護)
    window.addEvent = async function() {
        const dateInput = document.getElementById("date");
        const courseInput = document.getElementById("course");
        const eventInput = document.getElementById("event");
        const noteInput = document.getElementById("note");

        const date = dateInput.value;
        const course = courseInput.value.trim();
        const event = eventInput.value.trim();
        const note = noteInput.value.trim();

        if (date === "" || course === "") {
            alert("請填寫日期時間與課程名稱");
            return;
        }

        const newEventId = Date.now().toString() + Math.random().toString(36).substr(2, 5);
        const newEvent = {
            id: newEventId,
            createdAt: Date.now(),
            date: date,
            course: course,
            event: event,
            note: note
        };

        if (isCloudMode && currentUser) {
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'events', newEventId);
                await setDoc(docRef, newEvent);
            } catch (error) {
                console.error("雲端新增失敗:", error);
                alert("無法新增資料到雲端！");
            }
        } else {
            data.push(newEvent);
            try {
                localStorage.setItem("calendarData", JSON.stringify(data));
            } catch (storageError) {
                alert("因您使用無痕模式或APP內建瀏覽器，這筆資料關閉視窗後將會消失喔！");
            }
            refreshUI();
        }

        dateInput.value = "";
        courseInput.value = "";
        eventInput.value = "";
        noteInput.value = "";
    }

    // 搜尋功能
    document.getElementById("searchInput").addEventListener("input", refreshUI);

    // 找最近日期
    function getNearestExam() {
        const now = new Date();
        const futureEvents = data
            .map(e => ({ ...e, time: new Date(e.date) }))
            .filter(e => e.time.getTime() + 60000 > now.getTime());

        if (futureEvents.length === 0) return null;
        futureEvents.sort((a, b) => a.time - b.time);
        return futureEvents[0];
    }

    // 啟動倒數
    function startCountdown() {
        clearInterval(countdownTimer);

        const exam = getNearestExam();
        const topSand = document.querySelector('.sand.top');
        const bottomSand = document.querySelector('.sand.bottom');
        const hourglass = document.querySelector('.hourglass');

        if (!exam) {
            document.getElementById("examTitle").innerText = "沒有未來考試";
            document.getElementById("countdown").innerText = "00天 00:00:00";
            topSand.style.height = "0%";
            bottomSand.style.height = "0%";
            hourglass.classList.remove('active');
            hourglass.classList.remove('finished');
            return;
        }

        document.getElementById("examTitle").innerText = `最近考試：${exam.course} - ${exam.event}`;
        hourglass.classList.remove('finished'); 

        countdownTimer = setInterval(() => {
            const now = new Date();
            const target = new Date(exam.date);
            const diff = target - now;

            if (diff <= 0) {
                if (now.getTime() - target.getTime() >= 60000) {
                    startCountdown(); 
                    return;
                }
                document.getElementById("countdown").innerText = "考試時間到！";
                topSand.style.height = "0%";
                bottomSand.style.height = "50%";
                hourglass.classList.remove('active');
                hourglass.classList.add('finished');
                return;
            }

            const totalDuration = target.getTime() - exam.createdAt;
            let pct = totalDuration > 0 ? diff / totalDuration : 1;
            if (pct > 1) pct = 1;
            if (pct < 0) pct = 0;

            topSand.style.height = `${pct * 50}%`;
            bottomSand.style.height = `${(1 - pct) * 50}%`;
            hourglass.classList.add('active');

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor(diff / (1000 * 60 * 60) % 24);
            const mins = Math.floor(diff / (1000 * 60) % 60);
            const secs = Math.floor(diff / 1000 % 60);

            document.getElementById("countdown").innerText =
                `${days}天 ${hours.toString().padStart(2, '0')}:` +
                `${mins.toString().padStart(2, '0')}:` +
                `${secs.toString().padStart(2, '0')}`;
        }, 1000);
    }

    // 刪除事件
    window.deleteEvent = async function(id) {
        if (!confirm("確定要刪除這筆事項嗎？")) return;
        
        if (isCloudMode && currentUser) {
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'events', id);
                await deleteDoc(docRef);
            } catch (error) {
                console.error("雲端刪除失敗:", error);
                alert("無法從雲端刪除資料！");
            }
        } else {
            data = data.filter(item => item.id !== id);
            try {
                localStorage.setItem("calendarData", JSON.stringify(data));
            } catch (e) {
                // Ignore storage error
            }
            refreshUI();
        }
    }

</script>
</body>
</html>
